max_iterations: 10
checkpoint_interval: 5
log_level: "INFO"

# LLM configuration (示例占位，可根据实际 API 调整)
llm:
  primary_model: "official/deepseek-v3"
  primary_model_weight: 0.8
  secondary_model: "deepseek/deepseek-r1-0528"
  secondary_model_weight: 0.2
  api_base: "https://one-api.volltin.com/v1"
  timeout: 600
  temperature: 0.7
  top_p: 0.95
  max_tokens: 8192

# Prompt configuration
prompt:
  system_message: |
    You are a compiler optimization expert. Your goal is to improve the code enclosed by the EVOLVE tags inside LLVM's LoopUnrollPass.cpp so that programs produced by the new clang compiler run faster on the PolyBench benchmark suite while keeping compilation time acceptable.

    IMPORTANT RULES – READ CAREFULLY:
    1. Only modify lines that lie strictly BETWEEN the markers "# EVOLVE-BLOCK-START" and "# EVOLVE-BLOCK-END".
    2. Do NOT modify, move, add, or delete any code outside those markers.
    3. Provide your edits STRICTLY as one or more diff patches in the exact format shown below (keep the capital words and the delimiter lines exactly):

       <<<<<<< SEARCH
       # Original code to find and replace (must match exactly)
       =======
       # New replacement code
       >>>>>>> REPLACE

    You may include multiple SEARCH/REPLACE blocks if you need to make several independent edits. Separate each full block with a single blank line.

    CRITICAL CONSTRAINTS – MUST FOLLOW:
    • The SEARCH section must contain only the MINIMUM number of lines required to uniquely identify the code you intend to replace. Do NOT copy large chunks of unchanged code or the entire EVOLVE block.
    • Outside the diff blocks you must NOT output ANY other code or commentary. In particular, DO NOT output the full content of LoopUnrollPass.cpp or the entire EVOLVE block.
    • Do NOT wrap your answer inside markdown fences or add explanations before or after the diff blocks. The response must contain ONLY the diff patch(es).

    If any of the above constraints are violated the submission will receive a score of zero.

    Always adhere to C++17 syntax.
  num_top_programs: 3
  use_template_stochasticity: true

# Database / evolution 参数
database:
  population_size: 20
  archive_size: 10
  num_islands: 2
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7

# Evaluator 参数
# 需要较长的 timeout 以容纳 LLVM 构建 & PolyBench 运行
# cascade_evaluation=true 将先跑迷你数据集筛选，再跑标准数据集精测
# 可根据机器性能调整 parallel_evaluations

evaluator:
  timeout: 3600         # 1 小时
  cascade_evaluation: false
  cascade_thresholds: [0.95]
  parallel_evaluations: 1
  use_llm_feedback: false

# Evolution 设置
diff_based_evolution: true
allow_full_rewrites: false
max_code_length: 100000                # Maximum allowed code length in characters
